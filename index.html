<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能旅遊路線規劃</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <div class="container">
        <div id="map-container">
            <div id="map"></div>
        </div>

        <div id="info-panel">
            <h2>🌍 AI 行程規劃精靈</h2>
            
            <div class="form-group">
                <label>📍 起點 (縣市/鄉鎮/地址)：</label>
                <input type="text" id="start-point" placeholder="例如：台北火車站" value="台北車站">
            </div>

            <div id="waypoints-container"></div>
            <button id="add-stop-btn" class="secondary-btn">+ 新增停靠站</button>

            <div class="form-group" style="margin-top: 15px;">
                <label>🏁 終點 (縣市/鄉鎮/地址)：</label>
                <input type="text" id="end-point" placeholder="例如：日月潭" value="日月潭">
            </div>

            <div class="form-group">
                <label>💰 預算上下限 (可選)：</label>
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="budget-min" placeholder="最低">
                    <span>~</span>
                    <input type="number" id="budget-max" placeholder="最高">
                </div>
            </div>

            <div class="form-group">
                <label>🎨 旅遊風格：</label>
                <select id="travel-style">
                    <option value="leisure">☕ 悠閒放鬆 (網美咖啡廳、飯店)</option>
                    <option value="sports">⛰️ 運動健走 (步道、自然景觀)</option>
                    <option value="food">🍜 美食狂熱 (在地小吃、夜市)</option>
                </select>
            </div>

            <button id="submit-btn" class="primary-btn">✨ 開始 AI 智能規劃</button>

            <div id="result-area" class="hidden">
                <h3>📜 您的專屬 AI 行程</h3>
                <div id="loading" class="hidden">AI 正在計算最佳路線... 🤖⏳</div>
                <div id="itinerary" class="hidden">
                    </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
