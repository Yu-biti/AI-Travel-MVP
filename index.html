<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能旅遊路線規劃</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <div class="container">
        <div id="map-container">
            <div id="map"></div>
        </div>

        <div id="info-panel">
            
            <div id="page-1">
                <h2>🌍 AI 行程規劃精靈</h2>
                
                <div class="form-group">
                    <label>📍 起點：</label>
                    <input type="text" id="start-point" value="高雄楠梓">
                </div>

                <div id="waypoints-container"></div>
                <button id="add-stop-btn" class="secondary-btn">+ 新增中途停靠站</button>

                <div class="form-group" style="margin-top: 15px;">
                    <label>🏁 終點：</label>
                    <input type="text" id="end-point" value="台南安平">
                </div>

                <div class="form-row">
                    <div class="form-group half">
                        <label>🛑 預計停靠幾站：</label>
                        <input type="number" id="stop-count" value="3" min="1" max="10">
                    </div>
                    <div class="form-group half">
                        <label>⭐ 最低 Google 評分：</label>
                        <select id="min-rating">
                            <option value="4.0">4.0 顆星以上</option>
                            <option value="4.5">4.5 顆星以上</option>
                            <option value="4.8">4.8 顆星以上 (極品)</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>🎨 旅遊風格：</label>
                    <select id="travel-style">
                        <option value="food">🍜 美食狂熱 (在地小吃、夜市)</option>
                        <option value="leisure">☕ 悠閒放鬆 (網美咖啡廳、飯店)</option>
                        <option value="sports">⛰️ 運動健走 (步道、自然景觀)</option>
                    </select>
                </div>

                <button id="submit-btn" class="primary-btn">✨ 開始 AI 智能規劃</button>
            </div>

            <div id="page-2" class="hidden">
                <h2>📜 您的專屬 AI 行程</h2>
                <div id="loading" class="hidden">
                    <p>AI 正在根據您的條件運算最佳路線... 🤖⏳</p>
                </div>
                
                <div id="itinerary-content" class="hidden">
                    <div id="itinerary-list">
                        </div>
                    
                    <div class="button-group">
                        <button id="refresh-btn" class="primary-btn outline">🔄 重新刷新路線</button>
                        <button id="back-btn" class="secondary-btn">🔙 回上一頁設定</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
